<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Smart Expense Tracker</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

  <div class="auth-container">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <div class="auth-logo-icon">💰</div>
        <div class="auth-logo-text">Smart Expense Tracker</div>
      </div>

      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Login to manage your finances</p>

      <!-- Alert -->
      <div class="alert alert-error" id="alertMsg"></div>

      <!-- Form -->
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" />
      </div>

      <button class="btn-primary" id="loginBtn" onclick="handleLogin()">
        Login
      </button>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Register here</a>
      </div>

    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>

</body>
</html>
